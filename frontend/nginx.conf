resolver 127.0.0.11 valid=5s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location /api/ {
        set $backend "http://app:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
